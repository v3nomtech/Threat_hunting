# Elastic Detection Rule — TOML format
# Compatible with detection-rules repo (https://github.com/elastic/detection-rules)

[metadata]
creation_date = "2026/05/12"
maturity = "development"     # development | beta | production
updated_date = "2026/05/12"
origin_hypothesis = "H-XXX"  # link back to hypotheses/...

[rule]
author = ["v3nomtech"]
description = """
One-paragraph description of what the rule detects and why it matters.
Include the attacker behavior, not just the technical signal.
"""
from = "now-9m"
index = ["logs-endpoint.events.*", "winlogbeat-*"]
language = "eql"
license = "MIT"
name = "Short, action-oriented rule name"
risk_score = 47
severity = "medium"          # low | medium | high | critical
type = "eql"

# Confidence + noise — non-standard fields, custom for this repo
confidence = "Medium"
expected_noise = "1-5 alerts/day per 1k endpoints"

query = '''
process where event.type == "start" and
  process.name : "example.exe" and
  process.parent.name : "explorer.exe"
'''

[[rule.threat]]
framework = "MITRE ATT&CK"

  [rule.threat.tactic]
  id = "TA0XXX"
  name = "Tactic Name"
  reference = "https://attack.mitre.org/tactics/TA0XXX/"

  [[rule.threat.technique]]
  id = "TXXXX"
  name = "Technique Name"
  reference = "https://attack.mitre.org/techniques/TXXXX/"

[rule.false_positives]
known = [
  "Patch management tooling (SCCM, BigFix)",
  "Vulnerability scanners",
]

[rule.investigation_fields]
field_names = [
  "process.parent.name",
  "process.command_line",
  "user.name",
  "host.name",
]
